name: Eval

on:
  pull_request:
    paths:
      - "src/agent/**"
      - "memory/prompt-rules.md"
      - "evals/**"
      - "config/agent-config.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Prompt regression eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run eval harness
        id: evalrun
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -o pipefail
          npm run eval 2>&1 | tee eval-output.txt

      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            let body = "### Prompt regression eval\n\n```\n";
            try {
              body += fs.readFileSync("eval-output.txt", "utf8").slice(-6000);
            } catch (e) {
              body += `eval-output.txt missing: ${e.message}`;
            }
            body += "\n```";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
