name: Nightly

on:
  schedule:
    # 17:00 UTC = 00:00 Asia/Bangkok. GH Actions schedules can drift ~15 min
    # under load; fine for a nightly batch. The agent no-ops when no source
    # signal has changed since the last run.
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate + validate status.md but skip the commit to the dashboard repo"
        required: false
        type: boolean
        default: false

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  agent:
    name: Extract → commit weekly inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # the agent writes to the DASHBOARD repo via PAT, not this repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run agent (Confluence → status.md → dashboard)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # PAT scoped to bcali/roadmap-dashboard with contents:read AND contents:write.
          GITHUB_TOKEN: ${{ secrets.ROADMAP_REPO_TOKEN }}
          GITHUB_REPO: ${{ vars.DASHBOARD_REPO || 'bcali/roadmap-dashboard' }}
          GITHUB_BRANCH: ${{ vars.DASHBOARD_BRANCH || 'main' }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          TIMEZONE: ${{ vars.AGENT_TIMEZONE || 'Asia/Bangkok' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npm run agent

      - name: Upload generated inputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-inputs-${{ github.run_id }}
          path: |
            data/outputs/
            data/runs.jsonl
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_ALERTS_WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\":rotating_light: Roadmap agent nightly FAILED. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK"
