name: Nightly

on:
  schedule:
    # 17:00 UTC = 00:00 Asia/Bangkok. GitHub Actions schedules can drift
    # up to ~15 min under load; that's acceptable for a nightly batch.
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the orchestrator but skip the commit to nightly-outputs"
        required: false
        type: boolean
        default: false

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  agent:
    name: Run nightly agent
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run orchestrator
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ROADMAP_REPO_TOKEN }}
          GITHUB_REPO: ${{ vars.DASHBOARD_REPO || 'bcali/roadmap-dashboard' }}
          GITHUB_BRANCH: ${{ vars.DASHBOARD_BRANCH || 'main' }}
          TIMEZONE: ${{ vars.AGENT_TIMEZONE || 'Asia/Bangkok' }}
        run: npm run agent

      - name: Upload outputs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-outputs-${{ github.run_id }}
          path: data/outputs/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit outputs to nightly-outputs branch
        if: success() && inputs.dry_run != true
        run: |
          set -euo pipefail
          git config user.name  "roadmap-agent[bot]"
          git config user.email "roadmap-agent@users.noreply.github.com"

          # Fetch or create the orphan-style branch dedicated to outputs.
          if git ls-remote --exit-code --heads origin nightly-outputs >/dev/null; then
            git fetch origin nightly-outputs
            git checkout nightly-outputs
            git checkout main -- .gitignore
          else
            git checkout --orphan nightly-outputs
            git rm -rf --cached . >/dev/null 2>&1 || true
            git clean -fdx -e data/outputs -e .git
          fi

          mkdir -p outputs
          cp -r data/outputs/* outputs/ 2>/dev/null || echo "no outputs to copy"
          git add outputs
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            git commit -m "agent: nightly outputs $(date -u +%Y-%m-%d)"
            git push origin nightly-outputs
          fi

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_ALERTS_WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"text\":\":rotating_light: Roadmap agent nightly run FAILED. Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$WEBHOOK"
